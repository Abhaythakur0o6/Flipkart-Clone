version: "3.9"

services:

  # ─── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: flipkart-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - ADMIN_URL=http://localhost:5174
    restart: unless-stopped

  # ─── Client (Frontend) ──────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: flipkart-client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Admin ──────────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: flipkart-admin
    ports:
      - "5174:5174"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped